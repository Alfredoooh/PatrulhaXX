<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tela + Sheet Suave</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    body {
      position: relative;
    }

    :root {
      --anim: 320ms cubic-bezier(.2,.8,.2,1);
      --screen-radius: 16px;
      --sheet-radius: 16px;
      --gap: 12px;
    }

    .screen {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 1;
      overflow: hidden;
      border-radius: 0;
      transform: scale(1);
      transform-origin: center center;
      transition: transform var(--anim), inset var(--anim), border-radius var(--anim);
      will-change: transform, inset, border-radius;
    }

    .screen.shrunk {
      inset: var(--gap);
      transform: scale(0.985);
      border-radius: var(--screen-radius);
    }

    .content {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn {
      border: none;
      background: #111;
      color: #fff;
      padding: 14px 22px;
      font-size: 16px;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    .btn:active {
      transform: scale(0.97);
      opacity: 0.92;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.32);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--anim);
      z-index: 2;
    }

    .backdrop.show {
      opacity: 1;
      pointer-events: auto;
    }

    .sheet {
      position: fixed;
      left: 50%;
      bottom: 0;
      width: min(100%, 540px);
      z-index: 3;
      transform: translate(-50%, 110%);
      opacity: 0;
      pointer-events: none;
      transition: transform var(--anim), opacity var(--anim);
      will-change: transform, opacity;
    }

    .sheet.show {
      transform: translate(-50%, 0);
      opacity: 1;
      pointer-events: auto;
    }

    .sheet-panel {
      background: rgba(245, 245, 247, 0.98);
      border-radius: var(--sheet-radius) var(--sheet-radius) 0 0;
      box-shadow: 0 -8px 22px rgba(0, 0, 0, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.6);
      padding: 10px 18px 18px;
      transition: border-radius var(--anim), box-shadow var(--anim);
    }

    .sheet.show .sheet-panel {
      border-radius: 14px 14px 0 0;
      box-shadow: 0 -6px 16px rgba(0, 0, 0, 0.10);
    }

    .handle {
      width: 40px;
      height: 4px;
      border-radius: 999px;
      background: rgba(60, 60, 67, 0.25);
      margin: 6px auto 14px;
    }

    .sheet-title {
      margin: 0 0 8px;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      color: #111;
    }

    .sheet-text {
      margin: 0 0 16px;
      text-align: center;
      font-size: 15px;
      line-height: 1.45;
      color: rgba(0, 0, 0, 0.72);
    }

    .sheet-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn-secondary,
    .btn-primary {
      border: none;
      padding: 12px 18px;
      font-size: 15px;
      border-radius: 12px;
      cursor: pointer;
    }

    .btn-secondary {
      background: #e9e9ee;
      color: #111;
    }

    .btn-primary {
      background: #0a84ff;
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="backdrop" class="backdrop"></div>

  <div id="screen" class="screen">
    <div class="content">
      <button id="toggleBtn" class="btn">Reduzir tela</button>
    </div>
  </div>

  <div id="sheet" class="sheet">
    <div class="sheet-panel">
      <div class="handle"></div>
      <h2 class="sheet-title">iOS Paper Sheet</h2>
      <p class="sheet-text">
        O modal sobe ao mesmo tempo que a tela encolhe.
      </p>
      <div class="sheet-actions">
        <button id="closeBtn" class="btn-secondary">Fechar</button>
        <button class="btn-primary">Confirmar</button>
      </div>
    </div>
  </div>

  <script>
    const screen = document.getElementById('screen');
    const toggleBtn = document.getElementById('toggleBtn');
    const sheet = document.getElementById('sheet');
    const backdrop = document.getElementById('backdrop');
    const closeBtn = document.getElementById('closeBtn');

    let open = false;

    function syncUI(state) {
      screen.classList.toggle('shrunk', state);
      sheet.classList.toggle('show', state);
      backdrop.classList.toggle('show', state);
      toggleBtn.textContent = state ? 'Expandir tela' : 'Reduzir tela';
    }

    toggleBtn.addEventListener('click', () => {
      open = !open;
      syncUI(open);
    });

    closeBtn.addEventListener('click', () => {
      open = false;
      syncUI(false);
    });

    backdrop.addEventListener('click', () => {
      open = false;
      syncUI(false);
    });
  </script>
</body>
</html>
