name: patrulha_xx
description: patrulhaXX - Navegação privada e segura.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_inappwebview: ^6.1.5
  flutter_svg: ^2.0.10+1
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.4
  http: ^1.2.2
  dio: ^5.4.3+1
  permission_handler: ^11.3.1
  ionicons: ^0.2.2
  cached_network_image: ^3.3.1
  palette_generator: ^0.3.3+3
  cupertino_icons: ^1.0.8
  flutter_staggered_grid_view: ^0.7.0
  xml: ^6.5.0
  video_thumbnail: ^0.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    # ── Ícones ───────────────────────────────────────────────────────────────
    - assets/icons/app1.png          # Ícone PornHub (local)

    # ── Logo ─────────────────────────────────────────────────────────────────
    - assets/logo.png                # Pink devil — aparece no lock screen

    # ── Backgrounds ──────────────────────────────────────────────────────────
    # Adiciona aqui todos os ficheiros que colocares em assets/images/
    # Suporta .png, .jpg, .jpeg, .webp
    - assets/images/background.png   # Padrão (obrigatório)
    - assets/images/bg2.png
    - assets/images/bg3.png
    - assets/images/bg4.png
    - assets/images/bg5.png
    - assets/images/bg6.jpg
    - assets/images/bg7.jpg
    - assets/images/bg8.jpg
    - assets/images/bg9.jpg
    - assets/images/bg10.jpg
