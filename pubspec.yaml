name: patrulha_xx
description: patrulhaXX - Navegação privada e segura.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: 6.1.5
  flutter_p2p_connection: ^3.0.3
  flutter_svg: ^2.0.10+1
  shared_preferences: ^2.3.2      # substitui flutter_secure_storage — sem Tink, sem R8 crash
  qr_flutter: any
  material_symbols_icons: any
  lottie: ^3.1.0
  google_fonts: ^6.2.1
  path_provider: ^2.1.4
  http: ^1.2.2
  dio: ^5.4.3+1
  animations: any
  permission_handler: 11.3.1
  cached_network_image: ^3.3.1
  palette_generator: 0.3.3+3
  cupertino_icons: ^1.0.8
  flutter_staggered_grid_view: ^0.7.0
  xml: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/app1.png
    - assets/logo.png
    - assets/images/background.png
    - assets/images/bg2.jpg
    - assets/images/bg3.jpg
    - assets/images/bg4.jpg
    - assets/images/bg5.jpg
    - assets/images/bg6.jpg
    - assets/images/bg7.jpg
    - assets/images/bg8.jpg
    - assets/images/bg9.jpg
    - assets/images/bg10.jpg
    - assets/images/bg11.jpg
    - assets/images/bg12.jpg
    - assets/icons/downloads-folder.png
    - assets/lottie/tick_mark.json
    - assets/lottie/wrong_feedback.json