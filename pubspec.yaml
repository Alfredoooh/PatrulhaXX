name: patrulha_xx
description: patrulhaXX - Navegação privada e segura.
publish_to: "none"
version: 1.0.0+1

# Licença proprietária — ver ficheiro LICENSE na raiz do projecto.
# Copyright (c) 2024 patrulhaXX. Todos os direitos reservados.
license: "SEE LICENSE IN LICENSE"

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── WebView & Navegação ──────────────────────────────────────────────────
  flutter_inappwebview: 6.1.5
  url_launcher: any

  # ── UI & Ícones ──────────────────────────────────────────────────────────
  flutter_svg: ^2.0.10+1
  material_symbols_icons: any
  cupertino_icons: ^1.0.8
  lottie: ^3.1.0
  google_fonts: ^6.2.1
  animations: any
  flutter_staggered_grid_view: ^0.7.0

  # ── Multimédia ───────────────────────────────────────────────────────────
  video_player: ^2.8.6
  chewie: ^1.8.1
  cached_network_image: ^3.3.1
  palette_generator: 0.3.3+3
  image_picker: any
  photo_manager: ^3.3.0            # galeria rápida + modal

  # ── Rede & Dados ─────────────────────────────────────────────────────────
  http: ^1.2.2
  dio: ^5.4.3+1
  xml: ^6.5.0

  # ── Armazenamento & Preferências ─────────────────────────────────────────
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  path: ^1.9.0                     # manipulação de caminhos de ficheiro

  # ── Hardware & Permissões ────────────────────────────────────────────────
  permission_handler: 11.3.1
  mobile_scanner: ^5.2.3
  flutter_p2p_connection: ^3.0.3

  # ── QR Code ──────────────────────────────────────────────────────────────
  qr_flutter: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/app1.png
    - assets/logo.png
    - assets/images/background.png
    - assets/images/bg2.jpg
    - assets/images/bg3.jpg
    - assets/images/bg4.jpg
    - assets/images/bg5.jpg
    - assets/images/bg6.jpg
    - assets/images/bg7.jpg
    - assets/images/bg8.jpg
    - assets/images/bg9.jpg
    - assets/images/bg10.jpg
    - assets/images/bg11.jpg
    - assets/images/bg12.jpg
    - assets/videos/promo.mp4
    - assets/icons/downloads_folder.png
    - assets/lottie/tick_mark.json
    - assets/lottie/lock.json
    - assets/lottie/no_connection.json
    - assets/lottie/Cat_playing_animation.json
    - assets/lottie/wrong_feedback.json
    - assets/icons/svg/
    - assets/icons/svg/settings/