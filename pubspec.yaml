name: patrulha_xx
description: patrulhaXX - Navegação privada e segura.
publish_to: "none"
version: 1.0.0+1

license: "SEE LICENSE IN LICENSE"

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── WebView & Navegação ──────────────────────────────────────────────────
  flutter_inappwebview: 6.1.5
  url_launcher: any

  # ── UI & Ícones ──────────────────────────────────────────────────────────
  flutter_svg: ^2.0.10+1
  material_symbols_icons: any
  cupertino_icons: ^1.0.8
  lottie: ^3.1.0
  google_fonts: ^6.2.1
  animations: any
  flutter_staggered_grid_view: ^0.7.0

  # ── Multimédia ───────────────────────────────────────────────────────────
  video_player: ^2.8.6
  chewie: ^1.8.1
  cached_network_image: ^3.3.1
  palette_generator: 0.3.3+3
  image_picker: any
  lucide_flutter: any
  photo_manager: ^3.3.0

  # ── Rede & Dados ─────────────────────────────────────────────────────────
  http: ^1.2.2
  dio: ^5.4.3+1
  xml: ^6.5.0
  html: ^0.15.4

  # ── Armazenamento & Preferências ─────────────────────────────────────────
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  path: ^1.9.0
  flutter_cache_manager: ^3.3.1
  # ── Hardware & Permissões ────────────────────────────────────────────────
  permission_handler: 11.3.1
  mobile_scanner: ^5.2.3
  flutter_p2p_connection: ^3.0.3
  volume_controller: any

  # ── QR Code ──────────────────────────────────────────────────────────────
  qr_flutter: any

  # ── Splash ───────────────────────────────────────────────────────────────
  flutter_native_splash: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter_native_splash:
  color: "#0D0D0D"
  color_dark: "#0D0D0D"
  image: assets/logo.png
  image_dark: assets/logo.png
  android: true
  ios: true
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/icons/app1.png
    - assets/logo.png
    - assets/images/background.png
    - assets/images/bg2.jpg
    - assets/images/bg5.jpg
    - assets/images/bg6.jpg
    - assets/lottie/tick_mark.json
    - assets/lottie/lock.json
    - assets/lottie/no_connection.json
    - assets/lottie/Cat_playing_animation.json
    - assets/lottie/wrong_feedback.json
    - assets/icons/svg/
    - assets/icons/svg/settings/
    - assets/icons/svg/search.svg
    - assets/icons/svg/history.svg
    - assets/imagens/search_page/hetero.jpg
    - assets/imagens/search_page/homo.jpg
    - assets/imagens/search_page/lesbicas.jpg
    - assets/imagens/search_page/anal.jpg
    - assets/imagens/search_page/amador.jpg
    - assets/imagens/search_page/milf.jpg
    - assets/imagens/search_page/teen.jpg
    - assets/imagens/search_page/hentai.jpg