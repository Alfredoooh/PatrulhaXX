name: patrulha_xx
description: patrulhaXX - Navegação privada e segura.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_inappwebview: ^6.1.5
  flutter_svg: ^2.0.10+1
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.4
  http: ^1.2.2
  dio: ^5.4.3+1
  permission_handler: ^11.3.1
  ionicons: ^0.2.2
  cached_network_image: ^3.3.1
  palette_generator: ^0.3.3+3
  cupertino_icons: ^1.0.8

  # Gallery staggered grid
  flutter_staggered_grid_view: ^0.7.0

  # XML parsing for feeds
  xml: ^6.5.0

  # Blur app in recents / FLAG_SECURE
  flutter_windowmanager: ^0.2.0

  # Video thumbnails in gallery
  video_thumbnail: ^0.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/app1.png
    - assets/images/background.png
    - assets/logo.png          # Pink devil logo — copy the launcher PNG here
