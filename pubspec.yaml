name: patrulha_xx
description: patrulhaXX - App de navegação segura com múltiplas plataformas.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # WebView in-app completo (NÃO webview_flutter)
  flutter_inappwebview: ^6.1.5

  # SVG rendering
  flutter_svg: ^2.0.10+1

  # Armazenamento seguro (criptografado, invisível para outros apps)
  flutter_secure_storage: ^9.2.2

  # Caminhos para salvar arquivos apenas dentro do app
  path_provider: ^2.1.4

  # HTTP requests
  http: ^1.2.2

  # Permissões em runtime (câmera, storage, etc.)
  permission_handler: ^11.3.1

  # Download e salvar arquivos dentro do app (invisível para galeria)
  flutter_downloader: ^1.11.8

  # Abrindo/gerenciando arquivos internos
  open_filex: ^4.5.0

  # Gerenciamento de estado simples
  provider: ^6.1.2

  # Ícones extras
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    # Ícones circulares dos apps (512x512px PNG com fundo transparente)
    - assets/icons/youcube.png
    - assets/icons/myself.png
    - assets/icons/us_news.png
    - assets/icons/todays_war.png
    - assets/icons/app5.png
    - assets/icons/app6.png
    - assets/icons/app7.png
    - assets/icons/app8.png

    # Imagem de fundo da home (1080x1920px JPG ou PNG)
    - assets/images/background.png
