workflows:
  android-release:
    name: nuxxx Android Release
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
      vars:
        KEYSTORE_PATH: /tmp/nuxxx.jks
        KEY_ALIAS: nuxxx

    scripts:
      - name: Flutter packages
        script: flutter pub get

      - name: Generate keystore
        script: |
          keytool -genkey -v \
            -keystore "$KEYSTORE_PATH" \
            -alias "$KEY_ALIAS" \
            -keyalg RSA -keysize 2048 \
            -validity 36500 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=nuxxx,OU=nuxxx,O=nuxxx,L=Luanda,S=Luanda,C=AO"

      - name: key.properties
        script: |
          cat > android/key.properties << KEOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=$KEYSTORE_PATH
          KEOF

      - name: Build APK
        script: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/debug-info

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - o-teu-email@gmail.com
        notify:
          success: true
          failure: true
