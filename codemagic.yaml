workflows:

  android-compatibility-test:
    name: "Android Compatibility Test (API 21→30)"
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      android_signing:
        - your_keystore
      vars:
        PACKAGE_NAME: "com.patrulha.xx"

    scripts:

      # ── 1. Dependências Flutter ──────────────────────────────────────────
      - name: Get Flutter packages
        script: flutter pub get

      # ── 2. Gerar splash nativo ───────────────────────────────────────────
      - name: Generate native splash
        script: dart run flutter_native_splash:create

      # ── 3. Build APK debug ───────────────────────────────────────────────
      - name: Build debug APK
        script: |
          flutter build apk --debug \
            --target-platform android-arm,android-arm64 \
            --no-tree-shake-icons

      # ── 4. Testes de compatibilidade nos emuladores ──────────────────────
      - name: "Smoke test — API 22 (Android 5.1)"
        script: |
          set -e
          API=22
          AVD_NAME="test_avd_${API}"

          echo "▶ A criar AVD para API $API..."
          echo "no" | avdmanager create avd \
            --force \
            --name "$AVD_NAME" \
            --package "system-images;android-${API};default;x86" \
            --device "pixel"

          echo "▶ A iniciar emulador..."
          $ANDROID_HOME/emulator/emulator \
            -avd "$AVD_NAME" \
            -no-window \
            -no-audio \
            -no-boot-anim \
            -gpu swiftshader_indirect \
            -memory 2048 &
          EMULATOR_PID=$!

          echo "▶ A aguardar boot completo..."
          adb wait-for-device
          timeout 180 bash -c '
            until adb shell getprop sys.boot_completed 2>/dev/null | grep -q "^1$"; do
              sleep 3
            done
          '
          adb shell input keyevent 82

          echo "▶ A instalar APK..."
          adb install -r build/app/outputs/flutter-apk/app-debug.apk

          echo "▶ A lançar app..."
          adb shell am start -n "${PACKAGE_NAME}/.MainActivity"

          echo "▶ A aguardar 15s e verificar se não crashou..."
          sleep 15

          PID=$(adb shell "pidof ${PACKAGE_NAME}" 2>/dev/null || echo "")
          if [ -z "$PID" ]; then
            echo "❌ CRASH DETECTADO na API $API — processo morreu!"
            adb logcat -d -t 100 | grep -E "AndroidRuntime|FATAL|${PACKAGE_NAME}" || true
            kill $EMULATOR_PID || true
            exit 1
          else
            echo "✅ API $API OK — app em execução (PID=$PID)"
          fi

          adb exec-out screencap -p > "screenshot_api${API}.png" || true
          adb logcat -d > "logcat_api${API}.txt" || true

          kill $EMULATOR_PID || true
          avdmanager delete avd --name "$AVD_NAME" || true

