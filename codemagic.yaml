workflows:
  android-release:
    name: nuxxx Android Release
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
      vars:
        KEYSTORE_PATH: /tmp/nuxxx.jks
        KEY_ALIAS: nuxxx
      # No painel do Codemagic em Environment variables adiciona:
      # KEYSTORE_BASE64  → output do: base64 -w 0 nuxxx.jks
      # KEYSTORE_PASSWORD → a password do keystore
      # KEY_PASSWORD      → a password da key

    scripts:
      - name: Flutter packages
        script: flutter pub get

      - name: Restaurar keystore
        script: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"

      - name: key.properties
        script: |
          cat > android/key.properties << KEOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=$KEYSTORE_PATH
          KEOF

      - name: Build APK
        script: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/debug-info

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - o-teu-email@gmail.com
        notify:
          success: true
          failure: true